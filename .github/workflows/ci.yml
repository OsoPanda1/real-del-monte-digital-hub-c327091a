name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      # -------------------------
      # Checkout
      # -------------------------
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # -------------------------
      # Node.js setup
      # -------------------------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # -------------------------
      # Instalar dependencias
      # -------------------------
      - name: Install root deps
        run: npm ci

      - name: Install server deps
        run: npm ci
        working-directory: server

      - name: Install packages deps (monorepo)
        run: |
          for dir in packages/*; do
            if [ -f "$dir/package.json" ]; then
              echo "Installing deps in $dir"
              (cd "$dir" && npm ci 2>/dev/null || npm install 2>/dev/null || echo "skip $dir")
            fi
          done

      # -------------------------
      # Sincronización de roadmap
      # -------------------------
      - name: Roadmap sync (docs ↔ public/roadmap-rdmx.json)
        run: npm run roadmap:sync

      # -------------------------
      # Lint + tests frontend
      # -------------------------
      - name: Frontend lint
        run: npm run lint

      - name: Frontend unit tests
        run: npm test

      - name: Frontend build
        run: npm run build

      # -------------------------
      # Playwright E2E
      # -------------------------
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: E2E tests (Playwright, headless)
        run: npm run test:e2e
        env:
          CI: "true"

      # -------------------------
      # Backend build + Prisma
      # -------------------------
      - name: Backend build
        run: npm run build
        working-directory: server

      - name: Prisma migrate deploy (staging)
        if: ${{ secrets.STAGING_DATABASE_URL != '' }}
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
        run: npx prisma migrate deploy
        working-directory: server

      # -------------------------
      # Artefactos de build (opcional, útil para debugging y CD)
      # -------------------------
      - name: Upload frontend build artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: |
            dist
          if-no-files-found: ignore

      - name: Upload backend build artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: backend-build
          path: |
            server/dist
          if-no-files-found: ignore
